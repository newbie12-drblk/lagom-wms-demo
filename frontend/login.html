<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - LAGOM Pharma</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/login.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-container">
      <div class="login-card">
        <div class="logo">
          <div class="logo-icon">🧪</div>
          <h1>LAGOM Pharma</h1>
          <p>Hệ thống quản lý tồn kho</p>
        </div>

        <div class="error-message" id="errorMessage">
          <i class="fas fa-exclamation-triangle"></i>
          <span id="errorText">Sai tài khoản hoặc mật khẩu</span>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label><i class="fas fa-user"></i> Tên đăng nhập</label>
            <div class="input-wrapper">
              <i class="fas fa-user"></i>
              <input
                type="text"
                id="username"
                placeholder="Nhập tên đăng nhập"
                autocomplete="off"
              />
            </div>
          </div>

          <div class="form-group">
            <label><i class="fas fa-lock"></i> Mật khẩu</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="password"
                placeholder="Nhập mật khẩu"
              />
            </div>
          </div>

          <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt"></i> Đăng nhập
          </button>
        </form>

        <div class="info-note">
          <p>
            <i class="fas fa-shield-alt"></i> Hệ thống nội bộ - Vui lòng không
            chia sẻ tài khoản
          </p>
          <p style="font-size: 10px; margin-top: 8px; color: #4a5a7a">
            * Liên hệ quản trị viên để được cấp tài khoản
          </p>
        </div>
      </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
